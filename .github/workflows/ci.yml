name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Smoke test
        run: bun run demo

      - name: Build check
        run: bun build bin/pty-mgr.mjs --compile --outfile /tmp/pty-mgr-ci
